# GitHub Actions CI workflow for building and testing NEP with MPI compiler wrappers.
#
# NEP CI Parallel Pipeline - v1.9.0 Sprint 1
#
# Sprint 1 Scope: Compile and run all existing NEP tests using mpicc/mpif90.
# No MPI code is in the codebase - this confirms that existing code compiles
# and passes tests under OpenMPI compiler wrappers.
#
# Matrix: cmake x autotools (2 jobs total)
# MPI compilers are applied only to the NEP build itself.
# HDF5, NetCDF-C, and NetCDF-Fortran are built with plain GCC (cached).
#
# Edward Hartnett, Intelligent Data Design, Inc., May 2026
name: ci_parallel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  parallel-build:
    name: MPI Build (${{ matrix.build_system }})
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/hdf5-install/lib:${{ github.workspace }}/netcdf-c-install/lib:${{ github.workspace }}/netcdf-fortran-install/lib:$LD_LIBRARY_PATH
      PKG_CONFIG_PATH: ${{ github.workspace }}/netcdf-c-install/lib/pkgconfig:${{ github.workspace }}/hdf5-install/lib/pkgconfig
    strategy:
      fail-fast: false
      matrix:
        build_system: [cmake, autotools]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make wget zlib1g-dev autoconf automake libtool pkg-config

      - name: Install OpenMPI
        run: |
          sudo apt-get install -y libopenmpi-dev openmpi-bin

      - name: Show MPI compiler versions
        run: |
          echo "=== MPI compiler versions ==="
          mpicc --version
          mpif90 --version

      # Parallel builds require HDF5 and NetCDF-C built with MPI and parallel
      # support enabled. These use separate cache keys from ci.yml because the
      # build flags differ (-DHDF5_ENABLE_PARALLEL=ON, --enable-parallel-netcdf4).

      - name: Cache HDF5 parallel install
        id: cache-hdf5
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hdf5-install
          key: hdf5-2.1.0-parallel-openmpi-${{ runner.os }}-1

      - name: Download and build HDF5 2.1.0 (parallel)
        if: steps.cache-hdf5.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5_2.1.0.tar.gz &> /dev/null
          tar -xzf hdf5_2.1.0.tar.gz
          cd hdf5-hdf5_2.1.0
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/hdf5-install \
                -DCMAKE_C_COMPILER=mpicc \
                -DBUILD_SHARED_LIBS=ON \
                -DBUILD_TESTING=OFF \
                -DHDF5_ENABLE_ZLIB_SUPPORT=ON \
                -DHDF5_ENABLE_PARALLEL=ON \
                ..
          make -j$(nproc)
          make install

      - name: Cache NetCDF-C parallel install
        id: cache-netcdf-c
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/netcdf-c-install
          key: netcdf-c-4.10.0-parallel-openmpi-${{ runner.os }}-3

      - name: Download and build NetCDF-C (parallel)
        if: steps.cache-netcdf-c.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/Unidata/netcdf-c/archive/v4.10.0.tar.gz &> /dev/null
          tar -xzf v4.10.0.tar.gz
          cd netcdf-c-4.10.0
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$PATH"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$LD_LIBRARY_PATH"
          CC=mpicc ./configure \
            --prefix=$GITHUB_WORKSPACE/netcdf-c-install \
            --enable-netcdf-4 \
            --enable-shared \
            --disable-dap \
            --enable-parallel-netcdf4
          make -j$(nproc)
          make install

      - name: Cache NetCDF-Fortran parallel install
        id: cache-netcdf-fortran
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/netcdf-fortran-install
          key: netcdf-fortran-4.6.2-parallel-openmpi-${{ runner.os }}-1

      - name: Download and build NetCDF-Fortran (parallel)
        if: steps.cache-netcdf-fortran.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/Unidata/netcdf-fortran/archive/v4.6.2.tar.gz &> /dev/null
          tar -xzf v4.6.2.tar.gz
          cd netcdf-fortran-4.6.2
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$GITHUB_WORKSPACE/netcdf-c-install/bin:$PATH"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include -I$GITHUB_WORKSPACE/netcdf-c-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib -L$GITHUB_WORKSPACE/netcdf-c-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$LD_LIBRARY_PATH"
          CC=mpicc FC=mpif90 ./configure --prefix=$GITHUB_WORKSPACE/netcdf-fortran-install
          make -j$(nproc)
          make install

      # --- CMake build with MPI compilers ---

      - name: Configure with CMake (MPI)
        if: matrix.build_system == 'cmake'
        run: |
          mkdir -p build
          cd build
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/netcdf-c-install/lib/pkgconfig:$GITHUB_WORKSPACE/hdf5-install/lib/pkgconfig:${PKG_CONFIG_PATH}"
          cmake .. \
            -DCMAKE_C_COMPILER=mpicc \
            -DCMAKE_Fortran_COMPILER=mpif90 \
            -DCMAKE_C_FLAGS="-Wall -Werror" \
            -DCMAKE_Fortran_FLAGS="-Wall -Werror" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/hdf5-install;$GITHUB_WORKSPACE/netcdf-c-install;$GITHUB_WORKSPACE/netcdf-fortran-install" \
            -DENABLE_FORTRAN=ON \
            -DENABLE_PARALLEL_TESTS=ON \
            -DENABLE_GRIB2=OFF \
            -DENABLE_CDF=OFF \
            -DENABLE_GEOTIFF=OFF \
            -DBUILD_LZ4=OFF \
            -DBUILD_BZIP2=OFF \
            -DENABLE_FITS=OFF \
            -DBUILD_DOCUMENTATION=OFF \
            -DBUILD_EXAMPLES=ON \
            -DBUILD_TESTING=ON

      - name: Build (CMake)
        if: matrix.build_system == 'cmake'
        working-directory: build
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          make -j$(nproc)

      - name: Test (CMake)
        if: matrix.build_system == 'cmake'
        working-directory: build
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          export OMPI_ALLOW_RUN_AS_ROOT=1
          export OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          ctest --verbose

      # --- Autotools build with MPI compilers ---

      - name: Bootstrap (Autotools)
        if: matrix.build_system == 'autotools'
        run: autoreconf -fiv

      - name: Configure with Autotools (MPI)
        if: matrix.build_system == 'autotools'
        run: |
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$PATH"
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/netcdf-c-install/lib/pkgconfig:$GITHUB_WORKSPACE/hdf5-install/lib/pkgconfig:${PKG_CONFIG_PATH}"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include -I$GITHUB_WORKSPACE/netcdf-c-install/include -I$GITHUB_WORKSPACE/netcdf-fortran-install/include"
          export FCFLAGS="-I$GITHUB_WORKSPACE/netcdf-fortran-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib -L$GITHUB_WORKSPACE/netcdf-c-install/lib -L$GITHUB_WORKSPACE/netcdf-fortran-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          MPIEXEC_PATH=/usr/bin/mpiexec
          CC=mpicc FC=mpif90 ./configure \
            --with-hdf5=$GITHUB_WORKSPACE/hdf5-install/bin/h5cc \
            --enable-fortran \
            --enable-parallel-tests \
            --with-mpiexec=$MPIEXEC_PATH \
            --disable-grib2 \
            --disable-cdf \
            --disable-geotiff \
            --disable-lz4 \
            --disable-bzip2 \
            --disable-fits \
            --disable-docs \
            --enable-examples \
            || (echo "Configure failed. Printing config.log:"; cat config.log; exit 1)

      - name: Build (Autotools)
        if: matrix.build_system == 'autotools'
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          make -j$(nproc) CFLAGS="-Wall -Werror" FCFLAGS="-Wall -Werror -Wno-error=missing-include-dirs -I$GITHUB_WORKSPACE/netcdf-fortran-install/include"

      - name: Test (Autotools)
        if: matrix.build_system == 'autotools'
        run: |
          export PATH="$GITHUB_WORKSPACE/netcdf-c-install/bin:$PATH"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          export OMPI_ALLOW_RUN_AS_ROOT=1
          export OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
          make check CFLAGS="-Wall -Werror" FCFLAGS="-Wall -Werror -Wno-error=missing-include-dirs -I$GITHUB_WORKSPACE/netcdf-fortran-install/include" \
            || (echo "Tests failed. Printing test logs:"; \
                cat test/test-suite.log 2>/dev/null; \
                cat examples/parallelIO/test-suite.log 2>/dev/null; \
                exit 1)

      # --- Summary ---

      - name: Summary
        if: always()
        run: |
          echo "=== MPI Parallel Build Summary ==="
          echo "MPI:          openmpi"
          echo "Build System: ${{ matrix.build_system }}"
          echo "C compiler:   $(mpicc --version 2>&1 | head -1)"
          echo "FC compiler:  $(mpif90 --version 2>&1 | head -1)"
