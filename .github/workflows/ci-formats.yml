# GitHub Actions CI workflow for testing NEP format readers together.
#
# V2.2.0 Sprint 2: Reassign UDF Slot for CDF
#
# CDF has been moved to UDF4, so it is no longer mutually exclusive with
# GRIB2. This workflow builds all four extended format readers together
# (GeoTIFF + GRIB2 + FITS + CDF) for both CMake and Autotools.
#
# Edward Hartnett, Intelligent Data Design, Inc.
name: ci_formats

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  formats-build:
    name: Formats (${{ matrix.build_system }}, all-formats)
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/hdf5-install/lib:${{ github.workspace }}/netcdf-c-install/lib:${{ github.workspace }}/netcdf-fortran-install/lib:${{ github.workspace }}/cdf-install/lib:${{ github.workspace }}/g2c-install/lib:${{ github.workspace }}/jasper-install/lib:$LD_LIBRARY_PATH
      PKG_CONFIG_PATH: ${{ github.workspace }}/netcdf-c-install/lib/pkgconfig:${{ github.workspace }}/hdf5-install/lib/pkgconfig
    strategy:
      fail-fast: false
      matrix:
        build_system: [cmake, autotools]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make wget zlib1g-dev autoconf automake libtool pkg-config gfortran libzstd-dev

      - name: Install format libraries (GeoTIFF, FITS)
        run: |
          sudo apt-get install -y libgeotiff-dev libtiff-dev libcfitsio-dev libpng-dev

      # Cache NASA CDF install (v1.3.0+)
      - name: Cache NASA CDF install
        id: cache-cdf
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cdf-install
          key: cdf-3.9.1-${{ runner.os }}-1

      - name: Download and build NASA CDF library
        if: steps.cache-cdf.outputs.cache-hit != 'true'
        run: |
          wget https://spdf.gsfc.nasa.gov/pub/software/cdf/dist/cdf39_1/cdf39_1-dist-cdf.tar.gz &> /dev/null
          tar -xzf cdf39_1-dist-cdf.tar.gz
          cd cdf39_1-dist
          make OS=linux ENV=gnu all
          make INSTALLDIR=$GITHUB_WORKSPACE/cdf-install install

      # Cache HDF5 install
      - name: Cache HDF5 install
        id: cache-hdf5
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hdf5-install
          key: hdf5-2.0.0-${{ runner.os }}-3

      - name: Download and build HDF5 2.0.0
        if: steps.cache-hdf5.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5_2.0.0.tar.gz &> /dev/null
          tar -xzf hdf5_2.0.0.tar.gz
          cd hdf5-hdf5_2.0.0
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/hdf5-install -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF -DHDF5_ENABLE_ZLIB_SUPPORT=ON ..
          make -j$(nproc)
          make install

      # Cache NetCDF-C install
      - name: Cache NetCDF-C install
        id: cache-netcdf-c
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/netcdf-c-install
          key: netcdf-c-4.10.1-hdf5-2.0.0-${{ runner.os }}-1

      - name: Download and build NetCDF-C
        if: steps.cache-netcdf-c.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/Unidata/netcdf-c/archive/v4.10.1.tar.gz &> /dev/null
          tar -xzf v4.10.1.tar.gz
          cd netcdf-c-4.10.1
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$PATH"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$LD_LIBRARY_PATH"
          ./configure --prefix=$GITHUB_WORKSPACE/netcdf-c-install --enable-netcdf-4 --enable-shared --disable-dap
          make -j$(nproc)
          make install

      # Cache NetCDF-Fortran install
      - name: Cache NetCDF-Fortran install
        id: cache-netcdf-fortran
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/netcdf-fortran-install
          key: netcdf-fortran-4.6.2-${{ runner.os }}-2

      - name: Download and build NetCDF-Fortran
        if: steps.cache-netcdf-fortran.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/Unidata/netcdf-fortran/archive/v4.6.2.tar.gz &> /dev/null
          tar -xzf v4.6.2.tar.gz
          cd netcdf-fortran-4.6.2
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$GITHUB_WORKSPACE/netcdf-c-install/bin:$PATH"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include -I$GITHUB_WORKSPACE/netcdf-c-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib -L$GITHUB_WORKSPACE/netcdf-c-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$LD_LIBRARY_PATH"
          ./configure --prefix=$GITHUB_WORKSPACE/netcdf-fortran-install
          make -j$(nproc)
          make install

      # Cache Jasper install
      - name: Cache Jasper install
        id: cache-jasper
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/jasper-install
          key: jasper-4.2.4-${{ runner.os }}-1

      - name: Download and build Jasper 4.2.4
        if: steps.cache-jasper.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch version-4.2.4 https://github.com/jasper-software/jasper.git jasper-4.2.4
          # Build outside the source tree; Jasper's build/cmake/modules directory
          # contains required CMake modules and must not be removed.
          mkdir jasper-build && cd jasper-build
          cmake -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/jasper-install \
                -DBUILD_SHARED_LIBS=ON \
                -DJAS_ENABLE_DOC=OFF \
                -DJAS_ENABLE_PROGRAMS=OFF \
                $GITHUB_WORKSPACE/jasper-4.2.4
          make -j$(nproc)
          make install

      # Cache g2c install
      - name: Cache g2c install
        id: cache-g2c
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/g2c-install
          key: g2c-2.3.0-${{ runner.os }}-1

      - name: Download and build NCEPLIBS-g2c 2.3.0
        if: steps.cache-g2c.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/NOAA-EMC/NCEPLIBS-g2c/archive/refs/tags/v2.3.0.tar.gz &> /dev/null
          tar -xzf v2.3.0.tar.gz
          cd NCEPLIBS-g2c-2.3.0
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/g2c-install \
                -DBUILD_SHARED_LIBS=ON \
                -DBUILD_TESTING=OFF \
                -DBUILD_DOCS=OFF \
                -DCMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/jasper-install \
                ..
          make -j$(nproc)
          make install

      # --- CMake build ---
      - name: Configure with CMake
        if: matrix.build_system == 'cmake'
        run: |
          mkdir -p build && cd build
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/netcdf-c-install/lib/pkgconfig:$GITHUB_WORKSPACE/hdf5-install/lib/pkgconfig:${PKG_CONFIG_PATH}"
          cmake .. \
            -DCMAKE_C_FLAGS="-Wall -Werror" \
            -DCMAKE_Fortran_FLAGS="-Wall -Werror" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/hdf5-install;$GITHUB_WORKSPACE/netcdf-c-install;$GITHUB_WORKSPACE/netcdf-fortran-install;$GITHUB_WORKSPACE/cdf-install;$GITHUB_WORKSPACE/g2c-install;$GITHUB_WORKSPACE/jasper-install" \
            -DNEP_ENABLE_CDF=ON \
            -DNEP_ENABLE_GEOTIFF=ON \
            -DNEP_ENABLE_GRIB2=ON \
            -DNEP_ENABLE_FITS=ON \
            -DNEP_ENABLE_FORTRAN=ON \
            -DNEP_BUILD_LZ4=OFF \
            -DNEP_BUILD_BZIP2=OFF \
            -DNEP_BUILD_DOCUMENTATION=OFF \
            -DNEP_BUILD_EXAMPLES=OFF \
            -DBUILD_TESTING=ON
          echo "=== Checking config.h for format flags ==="
          grep "define HAVE_CDF" config.h && echo "SUCCESS: HAVE_CDF" || (echo "FAILURE: HAVE_CDF"; exit 1)
          grep "define HAVE_GEOTIFF" config.h && echo "SUCCESS: HAVE_GEOTIFF" || (echo "FAILURE: HAVE_GEOTIFF"; exit 1)
          grep "define HAVE_GRIB2" config.h && echo "SUCCESS: HAVE_GRIB2" || (echo "FAILURE: HAVE_GRIB2"; exit 1)
          grep "define HAVE_FITS" config.h && echo "SUCCESS: HAVE_FITS" || (echo "FAILURE: HAVE_FITS"; exit 1)

      - name: Build (CMake)
        if: matrix.build_system == 'cmake'
        working-directory: build
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$GITHUB_WORKSPACE/cdf-install/lib:$GITHUB_WORKSPACE/g2c-install/lib:$GITHUB_WORKSPACE/jasper-install/lib:$LD_LIBRARY_PATH"
          make -j$(nproc)

      - name: Test (CMake)
        if: matrix.build_system == 'cmake'
        working-directory: build
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$GITHUB_WORKSPACE/cdf-install/lib:$GITHUB_WORKSPACE/g2c-install/lib:$GITHUB_WORKSPACE/jasper-install/lib:$LD_LIBRARY_PATH"
          ctest --verbose

      # --- Autotools build ---
      - name: Bootstrap (Autotools)
        if: matrix.build_system == 'autotools'
        run: autoreconf -fiv

      - name: Configure with Autotools
        if: matrix.build_system == 'autotools'
        run: |
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$PATH"
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/netcdf-c-install/lib/pkgconfig:$GITHUB_WORKSPACE/hdf5-install/lib/pkgconfig:${PKG_CONFIG_PATH}"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include -I$GITHUB_WORKSPACE/netcdf-c-install/include -I$GITHUB_WORKSPACE/netcdf-fortran-install/include -I$GITHUB_WORKSPACE/g2c-install/include -I$GITHUB_WORKSPACE/cdf-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib -L$GITHUB_WORKSPACE/netcdf-c-install/lib -L$GITHUB_WORKSPACE/netcdf-fortran-install/lib -L$GITHUB_WORKSPACE/g2c-install/lib -L$GITHUB_WORKSPACE/jasper-install/lib -L$GITHUB_WORKSPACE/cdf-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$GITHUB_WORKSPACE/cdf-install/lib:$GITHUB_WORKSPACE/g2c-install/lib:$GITHUB_WORKSPACE/jasper-install/lib:$LD_LIBRARY_PATH"
          ./configure \
            --with-hdf5=$GITHUB_WORKSPACE/hdf5-install/bin/h5cc \
            --enable-cdf \
            --enable-geotiff \
            --enable-grib2 \
            --enable-fits \
            --enable-fortran \
            --disable-lz4 \
            --disable-bzip2 \
            --disable-docs \
            || (echo "Configure failed:"; cat config.log; exit 1)
          echo "=== Checking config.h for format flags ==="
          grep "define HAVE_CDF" config.h && echo "SUCCESS: HAVE_CDF" || (echo "FAILURE: HAVE_CDF"; exit 1)
          grep "define HAVE_GEOTIFF" config.h && echo "SUCCESS: HAVE_GEOTIFF" || (echo "FAILURE: HAVE_GEOTIFF"; exit 1)
          grep "define HAVE_GRIB2" config.h && echo "SUCCESS: HAVE_GRIB2" || (echo "FAILURE: HAVE_GRIB2"; exit 1)
          grep "define HAVE_FITS" config.h && echo "SUCCESS: HAVE_FITS" || (echo "FAILURE: HAVE_FITS"; exit 1)

      - name: Build (Autotools)
        if: matrix.build_system == 'autotools'
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$GITHUB_WORKSPACE/cdf-install/lib:$GITHUB_WORKSPACE/g2c-install/lib:$GITHUB_WORKSPACE/jasper-install/lib:$LD_LIBRARY_PATH"
          make -j$(nproc)

      - name: Test (Autotools)
        if: matrix.build_system == 'autotools'
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$GITHUB_WORKSPACE/cdf-install/lib:$GITHUB_WORKSPACE/g2c-install/lib:$GITHUB_WORKSPACE/jasper-install/lib:$LD_LIBRARY_PATH"
          make check || (
            echo "Tests failed. Collecting test logs:";
            for log in test/test-suite.log test_geotiff/test-suite.log test_grib2/test-suite.log test_fits/test-suite.log test_cdf/test-suite.log ftest/test-suite.log; do
              if [ -f "$log" ]; then
                echo "=== $log ===";
                cat "$log";
              fi;
            done;
            exit 1
          )

      - name: Summary
        if: always()
        run: |
          echo "=== Formats CI Build Summary ==="
          echo "Build System: ${{ matrix.build_system }}"
          echo "Format Set: all-formats (CDF + GeoTIFF + GRIB2 + FITS)"
          echo "HDF5: 2.0.0"
          echo "NetCDF-C: 4.10.1"
          echo "NetCDF-Fortran: 4.6.2"

  # V2.2.0 Sprint 3: PDS4-only build job
  pds4-build:
    name: PDS4 (${{ matrix.build_system }}, pds4-only)
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: ${{ github.workspace }}/hdf5-install/lib:${{ github.workspace }}/netcdf-c-install/lib:${{ github.workspace }}/netcdf-fortran-install/lib:$LD_LIBRARY_PATH
      PKG_CONFIG_PATH: ${{ github.workspace }}/netcdf-c-install/lib/pkgconfig:${{ github.workspace }}/hdf5-install/lib/pkgconfig
    strategy:
      fail-fast: false
      matrix:
        build_system: [cmake, autotools]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make wget zlib1g-dev autoconf automake libtool pkg-config gfortran

      - name: Install libxml2 (for PDS4)
        run: sudo apt-get install -y libxml2-dev

      # Cache HDF5 install (reuse key from formats-build job)
      - name: Cache HDF5 install
        id: cache-hdf5
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/hdf5-install
          key: hdf5-2.0.0-${{ runner.os }}-3

      - name: Download and build HDF5 2.0.0
        if: steps.cache-hdf5.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/HDFGroup/hdf5/archive/refs/tags/hdf5_2.0.0.tar.gz &> /dev/null
          tar -xzf hdf5_2.0.0.tar.gz
          cd hdf5-hdf5_2.0.0
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/hdf5-install -DBUILD_SHARED_LIBS=ON -DBUILD_TESTING=OFF -DHDF5_ENABLE_ZLIB_SUPPORT=ON ..
          make -j$(nproc)
          make install

      # Cache NetCDF-C install (reuse key from formats-build job)
      - name: Cache NetCDF-C install
        id: cache-netcdf-c
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/netcdf-c-install
          key: netcdf-c-4.10.1-hdf5-2.0.0-${{ runner.os }}-1

      - name: Download and build NetCDF-C
        if: steps.cache-netcdf-c.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/Unidata/netcdf-c/archive/v4.10.1.tar.gz &> /dev/null
          tar -xzf v4.10.1.tar.gz
          cd netcdf-c-4.10.1
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$PATH"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$LD_LIBRARY_PATH"
          ./configure --prefix=$GITHUB_WORKSPACE/netcdf-c-install --enable-netcdf-4 --enable-shared --disable-dap
          make -j$(nproc)
          make install

      # Cache NetCDF-Fortran install (reuse key from formats-build job)
      - name: Cache NetCDF-Fortran install
        id: cache-netcdf-fortran
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/netcdf-fortran-install
          key: netcdf-fortran-4.6.2-${{ runner.os }}-2

      - name: Download and build NetCDF-Fortran
        if: steps.cache-netcdf-fortran.outputs.cache-hit != 'true'
        run: |
          wget https://github.com/Unidata/netcdf-fortran/archive/v4.6.2.tar.gz &> /dev/null
          tar -xzf v4.6.2.tar.gz
          cd netcdf-fortran-4.6.2
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$GITHUB_WORKSPACE/netcdf-c-install/bin:$PATH"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include -I$GITHUB_WORKSPACE/netcdf-c-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib -L$GITHUB_WORKSPACE/netcdf-c-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$LD_LIBRARY_PATH"
          ./configure --prefix=$GITHUB_WORKSPACE/netcdf-fortran-install
          make -j$(nproc)
          make install

      # --- CMake build ---
      - name: Configure with CMake
        if: matrix.build_system == 'cmake'
        run: |
          mkdir -p build && cd build
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/netcdf-c-install/lib/pkgconfig:$GITHUB_WORKSPACE/hdf5-install/lib/pkgconfig:${PKG_CONFIG_PATH}"
          cmake .. \
            -DCMAKE_C_FLAGS="-Wall -Werror" \
            -DCMAKE_Fortran_FLAGS="-Wall -Werror" \
            -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/hdf5-install;$GITHUB_WORKSPACE/netcdf-c-install;$GITHUB_WORKSPACE/netcdf-fortran-install" \
            -DNEP_ENABLE_PDS4=ON \
            -DNEP_ENABLE_CDF=OFF \
            -DNEP_ENABLE_GEOTIFF=OFF \
            -DNEP_ENABLE_GRIB2=OFF \
            -DNEP_ENABLE_FITS=OFF \
            -DNEP_ENABLE_FORTRAN=ON \
            -DNEP_BUILD_LZ4=OFF \
            -DNEP_BUILD_BZIP2=OFF \
            -DNEP_BUILD_DOCUMENTATION=OFF \
            -DNEP_BUILD_EXAMPLES=OFF \
            -DBUILD_TESTING=ON
          echo "=== Checking config.h for PDS4 flag ==="
          grep "define HAVE_PDS4" config.h && echo "SUCCESS: HAVE_PDS4" || (echo "FAILURE: HAVE_PDS4"; exit 1)

      - name: Build (CMake)
        if: matrix.build_system == 'cmake'
        working-directory: build
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          make -j$(nproc)

      - name: Test (CMake)
        if: matrix.build_system == 'cmake'
        working-directory: build
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          ctest --verbose

      # --- Autotools build ---
      - name: Bootstrap (Autotools)
        if: matrix.build_system == 'autotools'
        run: autoreconf -fiv

      - name: Configure with Autotools
        if: matrix.build_system == 'autotools'
        run: |
          export PATH="$GITHUB_WORKSPACE/hdf5-install/bin:$PATH"
          export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/netcdf-c-install/lib/pkgconfig:$GITHUB_WORKSPACE/hdf5-install/lib/pkgconfig:${PKG_CONFIG_PATH}"
          export CPPFLAGS="-I$GITHUB_WORKSPACE/hdf5-install/include -I$GITHUB_WORKSPACE/netcdf-c-install/include -I$GITHUB_WORKSPACE/netcdf-fortran-install/include"
          export LDFLAGS="-L$GITHUB_WORKSPACE/hdf5-install/lib -L$GITHUB_WORKSPACE/netcdf-c-install/lib -L$GITHUB_WORKSPACE/netcdf-fortran-install/lib"
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          ./configure \
            --with-hdf5=$GITHUB_WORKSPACE/hdf5-install/bin/h5cc \
            --enable-pds4 \
            --disable-cdf \
            --disable-geotiff \
            --disable-grib2 \
            --disable-fits \
            --enable-fortran \
            --disable-lz4 \
            --disable-bzip2 \
            --disable-docs \
            || (echo "Configure failed:"; cat config.log; exit 1)
          echo "=== Checking config.h for PDS4 flag ==="
          grep "define HAVE_PDS4" config.h && echo "SUCCESS: HAVE_PDS4" || (echo "FAILURE: HAVE_PDS4"; exit 1)

      - name: Build (Autotools)
        if: matrix.build_system == 'autotools'
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          make -j$(nproc)

      - name: Test (Autotools)
        if: matrix.build_system == 'autotools'
        run: |
          export LD_LIBRARY_PATH="$GITHUB_WORKSPACE/hdf5-install/lib:$GITHUB_WORKSPACE/netcdf-c-install/lib:$GITHUB_WORKSPACE/netcdf-fortran-install/lib:$LD_LIBRARY_PATH"
          make check || (
            echo "Tests failed. Collecting test logs:";
            for log in test/test-suite.log ftest/test-suite.log; do
              if [ -f "$log" ]; then
                echo "=== $log ===";
                cat "$log";
              fi;
            done;
            exit 1
          )

      - name: Summary
        if: always()
        run: |
          echo "=== PDS4 CI Build Summary ==="
          echo "Build System: ${{ matrix.build_system }}"
          echo "Format Set: pds4-only"
          echo "HDF5: 2.0.0"
          echo "NetCDF-C: 4.10.1"
          echo "NetCDF-Fortran: 4.6.2"
