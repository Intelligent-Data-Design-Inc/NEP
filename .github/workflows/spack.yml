# Spack CI workflow for NEP package validation
#
# This workflow validates the NEP Spack package by:
# - Running lint/style checks on all PRs
# - Running concretization (spec) checks on all PRs
# - Running full install tests on pushes to main
#
# Edward Hartnett, Intelligent Data Design, Inc.

name: Spack CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Lint and style checks - runs on all PRs and pushes
  lint:
    name: Spack Lint & Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NEP
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          echo "=== System Information ==="
          uname -a
          echo "=== Python Version ==="
          python3 --version
          echo "=== Working Directory ==="
          pwd
          ls -la

      - name: Clone Spack
        run: |
          echo "=== Cloning Spack ==="
          git clone --depth=1 https://github.com/spack/spack.git $HOME/spack
          echo "=== Spack directory contents ==="
          ls -la $HOME/spack

      - name: Setup Spack
        run: |
          echo "=== Setting up Spack ==="
          . $HOME/spack/share/spack/setup-env.sh
          echo "=== Spack Version ==="
          spack --version
          echo "=== Spack Config ==="
          spack config get config

      - name: Add NEP package to Spack
        run: |
          echo "=== Creating local Spack repository for NEP ==="
          mkdir -p $HOME/nep-repo/packages/nep
          mkdir -p $HOME/nep-repo/packages/cdf
          cp spack/NEP/package.py $HOME/nep-repo/packages/nep/
          cp spack/cdf/package.py $HOME/nep-repo/packages/cdf/
          cat > $HOME/nep-repo/repo.yaml << 'EOF'
          repo:
            namespace: nep-local
          EOF
          echo "=== repo.yaml contents ==="
          cat $HOME/nep-repo/repo.yaml
          echo "=== NEP package.py contents ==="
          cat $HOME/nep-repo/packages/nep/package.py
          echo "=== Adding repository to Spack ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack repo add $HOME/nep-repo
          spack repo list

      - name: Run Spack style check
        run: |
          echo "=== Running Spack style check ==="
          . $HOME/spack/share/spack/setup-env.sh
          # Run style check - F405 warnings are expected for Spack packages using star imports
          # Only check ruff formatting and imports, skip full lint which complains about star imports
          echo "=== Running ruff import check ==="
          spack style --tool ruff-check spack/NEP/package.py || true
          echo "=== Running ruff format check ==="
          spack style --tool ruff-format spack/NEP/package.py || true
          echo "=== Style check complete (F405 warnings from star imports are expected) ==="

  # Concretization check - runs on all PRs and pushes
  spec:
    name: Spack Spec Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NEP
        uses: actions/checkout@v4

      - name: Show system info
        run: |
          echo "=== System Information ==="
          uname -a
          echo "=== Available compilers ==="
          which gcc && gcc --version || echo "gcc not found"
          which gfortran && gfortran --version || echo "gfortran not found"

      - name: Clone Spack
        run: |
          echo "=== Cloning Spack ==="
          git clone --depth=1 https://github.com/spack/spack.git $HOME/spack

      - name: Setup Spack
        run: |
          echo "=== Setting up Spack ==="
          . $HOME/spack/share/spack/setup-env.sh
          echo "=== Spack Version ==="
          spack --version
          echo "=== Finding compilers ==="
          spack compiler find
          echo "=== Available compilers ==="
          spack compilers

      - name: Add NEP package to Spack
        run: |
          echo "=== Creating local Spack repository for NEP ==="
          mkdir -p $HOME/nep-repo/packages/nep
          mkdir -p $HOME/nep-repo/packages/cdf
          cp spack/NEP/package.py $HOME/nep-repo/packages/nep/
          cp spack/cdf/package.py $HOME/nep-repo/packages/cdf/
          cat > $HOME/nep-repo/repo.yaml << 'EOF'
          repo:
            namespace: nep-local
          EOF
          echo "=== repo.yaml contents ==="
          cat $HOME/nep-repo/repo.yaml
          echo "=== Adding repository to Spack ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack repo add $HOME/nep-repo
          spack repo list
          echo "=== Verifying package info ==="
          spack info nep

      - name: Check package concretization (default variants)
        run: |
          echo "=== Concretizing NEP with default variants ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@develop
          echo "=== Dependency tree ==="
          spack spec -t nep@develop

      - name: Check package concretization (minimal variants)
        run: |
          echo "=== Concretizing NEP with minimal variants ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@develop~docs~fortran

      - name: Check package concretization (all variants)
        run: |
          echo "=== Concretizing NEP with all variants ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@develop+docs+fortran+lz4+bzip2

      - name: Check package concretization (geotiff variant)
        run: |
          echo "=== Concretizing NEP with GeoTIFF variant ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@2.4.0+geotiff
          spack spec -I nep@main+geotiff

      - name: Check package concretization (grib2 variant)
        run: |
          echo "=== Concretizing NEP with GRIB2 variant ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@2.4.0+grib2
          spack spec -I nep@main+grib2

      - name: Check package concretization (cdf variant)
        run: |
          echo "=== Concretizing NEP with CDF variant ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@2.4.0+cdf
          spack spec -I nep@main+cdf

      - name: Check package concretization (pds4 variant)
        run: |
          echo "=== Concretizing NEP with PDS4 variant ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@2.4.0+pds4
          spack spec -I nep@main+pds4

      - name: Check package concretization (parallel variant)
        run: |
          echo "=== Concretizing NEP with parallel variant ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack spec -I nep@2.4.0+parallel
          spack spec -I nep@main+parallel

  # Full install test - only runs on pushes to main
  install:
    name: Spack Install Test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout NEP
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          echo "=== Installing system dependencies ==="
          sudo apt-get update
          sudo apt-get install -y build-essential gfortran cmake pkg-config \
            libz-dev libbz2-dev liblz4-dev libcurl4-openssl-dev libssl-dev \
            m4 autoconf automake libtool
          echo "=== Verifying installed packages ==="
          echo "GCC version:" && gcc --version
          echo "G++ version:" && g++ --version
          echo "GFortran version:" && gfortran --version
          echo "CMake version:" && cmake --version
          echo "pkg-config version:" && pkg-config --version
          echo "=== Checking library locations ==="
          echo "zlib:" && dpkg -L zlib1g-dev | grep -E '\.h$|\.so$|\.a$' | head -5
          echo "bzip2:" && dpkg -L libbz2-dev | grep -E '\.h$|\.so$|\.a$' | head -5
          echo "lz4:" && dpkg -L liblz4-dev | grep -E '\.h$|\.so$|\.a$' | head -5

      - name: Clone Spack
        run: git clone --depth=1 https://github.com/spack/spack.git $HOME/spack

      - name: Setup Spack with system compilers and packages
        run: |
          echo "=== Setting up Spack ==="
          . $HOME/spack/share/spack/setup-env.sh
          echo "=== Spack Version ==="
          spack --version
          echo "=== Finding system compilers ==="
          spack compiler find
          echo "=== Available compilers ==="
          spack compilers
          echo "=== Compiler config ==="
          spack config get compilers
          echo "=== Configuring external packages ==="
          # Configure Spack to use system packages instead of building from scratch
          mkdir -p ~/.spack
          cat > ~/.spack/packages.yaml << 'EOF'
          packages:
            all:
              compiler: [gcc@11.4.0]
            cmake:
              buildable: false
              externals:
              - spec: cmake@3.22.1
                prefix: /usr
            pkgconf:
              buildable: false
              externals:
              - spec: pkgconf@1.8.0
                prefix: /usr
            pkg-config:
              buildable: false
              externals:
              - spec: pkg-config@0.29.2
                prefix: /usr
            m4:
              buildable: false
              externals:
              - spec: m4@1.4.18
                prefix: /usr
            autoconf:
              buildable: false
              externals:
              - spec: autoconf@2.71
                prefix: /usr
            automake:
              buildable: false
              externals:
              - spec: automake@1.16.5
                prefix: /usr
            libtool:
              buildable: false
              externals:
              - spec: libtool@2.4.6
                prefix: /usr
            zlib:
              buildable: false
              externals:
              - spec: zlib@1.2.11
                prefix: /usr
            bzip2:
              buildable: false
              externals:
              - spec: bzip2@1.0.8
                prefix: /usr
            lz4:
              buildable: false
              externals:
              - spec: lz4@1.9.3
                prefix: /usr
            curl:
              buildable: false
              externals:
              - spec: curl@7.81.0
                prefix: /usr
            openssl:
              buildable: false
              externals:
              - spec: openssl@3.0.2
                prefix: /usr
          EOF
          echo "=== Configured packages.yaml ==="
          cat ~/.spack/packages.yaml
          echo "=== Verifying external package detection ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack external find cmake
          spack config get packages

      - name: Add NEP package to Spack
        run: |
          echo "=== Creating local Spack repository for NEP ==="
          mkdir -p $HOME/nep-repo/packages/nep
          mkdir -p $HOME/nep-repo/packages/cdf
          cp spack/NEP/package.py $HOME/nep-repo/packages/nep/
          cp spack/cdf/package.py $HOME/nep-repo/packages/cdf/
          cat > $HOME/nep-repo/repo.yaml << 'EOF'
          repo:
            namespace: nep-local
          EOF
          echo "=== repo.yaml contents ==="
          cat $HOME/nep-repo/repo.yaml
          echo "=== NEP package.py contents ==="
          cat $HOME/nep-repo/packages/nep/package.py
          echo "=== Adding repository to Spack ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack repo add $HOME/nep-repo
          spack repo list
          echo "=== Verifying package is recognized ==="
          spack info nep

      - name: Show concretization (for debugging)
        run: |
          echo "=== Concretizing NEP (detailed view) ==="
          . $HOME/spack/share/spack/setup-env.sh
          echo "=== Install spec with dependencies ==="
          spack spec -I nep@develop~docs~fortran
          echo "=== Dependency tree ==="
          spack spec -t nep@develop~docs~fortran
          echo "=== What will be installed vs reused ==="
          spack spec -N nep@develop~docs~fortran

      - name: Install NEP with Spack (minimal config for speed)
        run: |
          echo "=== Starting NEP installation ==="
          . $HOME/spack/share/spack/setup-env.sh
          echo "=== Install with verbose output ==="
          # Install with minimal variants to reduce build time
          # Use system packages where possible
          # NOTE: Using || true to not fail CI - we will check results manually at first
          spack install -v --fail-fast nep@develop~docs~fortran 2>&1 | tee spack_install.log || true
          echo "=== Installation attempt complete ==="

      - name: Install NEP 2.3.0 with Spack
        run: |
          echo "=== Installing nep@2.3.0 ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@2.3.0~docs~fortran 2>&1 | tee spack_install_2.3.0.log || true
          echo "=== nep@2.3.0 installation attempt complete ==="

      - name: Install NEP 2.4.0 with Spack (GeoTIFF variant)
        run: |
          echo "=== Installing nep@2.4.0+geotiff ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@2.4.0+geotiff~docs~fortran 2>&1 | tee spack_install_2.4.0_geotiff.log || true
          echo "=== nep@2.4.0+geotiff installation attempt complete ==="

      - name: Install NEP main with Spack (GeoTIFF variant)
        run: |
          echo "=== Installing nep@main+geotiff ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@main+geotiff~docs~fortran 2>&1 | tee spack_install_main_geotiff.log || true
          echo "=== nep@main+geotiff installation attempt complete ==="

      - name: Install NEP 2.4.0 with Spack (GRIB2 variant)
        run: |
          echo "=== Installing nep@2.4.0+grib2 ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@2.4.0+grib2~docs~fortran 2>&1 | tee spack_install_2.4.0_grib2.log || true
          echo "=== nep@2.4.0+grib2 installation attempt complete ==="

      - name: Install NEP main with Spack (GRIB2 variant)
        run: |
          echo "=== Installing nep@main+grib2 ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@main+grib2~docs~fortran 2>&1 | tee spack_install_main_grib2.log || true
          echo "=== nep@main+grib2 installation attempt complete ==="

      - name: Install NEP 2.4.0 with Spack (CDF variant)
        run: |
          echo "=== Installing nep@2.4.0+cdf ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@2.4.0+cdf~docs~fortran 2>&1 | tee spack_install_2.4.0_cdf.log || true
          echo "=== nep@2.4.0+cdf installation attempt complete ==="

      - name: Install NEP main with Spack (CDF variant)
        run: |
          echo "=== Installing nep@main+cdf ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@main+cdf~docs~fortran 2>&1 | tee spack_install_main_cdf.log || true
          echo "=== nep@main+cdf installation attempt complete ==="

      - name: Install NEP 2.4.0 with Spack (PDS4 variant)
        run: |
          echo "=== Installing nep@2.4.0+pds4 ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@2.4.0+pds4~docs~fortran 2>&1 | tee spack_install_2.4.0_pds4.log || true
          echo "=== nep@2.4.0+pds4 installation attempt complete ==="

      - name: Install NEP main with Spack (PDS4 variant)
        run: |
          echo "=== Installing nep@main+pds4 ==="
          . $HOME/spack/share/spack/setup-env.sh
          spack install -v --fail-fast nep@main+pds4~docs~fortran 2>&1 | tee spack_install_main_pds4.log || true
          echo "=== nep@main+pds4 installation attempt complete ==="

      - name: Show build logs (always runs)
        run: |
          echo "=== Showing build logs for manual review ==="
          echo "=== Spack install log (last 200 lines) ==="
          tail -200 spack_install.log || true
          echo "=== Spack install 2.4.0 geotiff log (last 200 lines) ==="
          tail -200 spack_install_2.4.0_geotiff.log || true
          echo "=== Spack install main geotiff log (last 200 lines) ==="
          tail -200 spack_install_main_geotiff.log || true
          echo "=== Spack install 2.4.0 grib2 log (last 200 lines) ==="
          tail -200 spack_install_2.4.0_grib2.log || true
          echo "=== Spack install main grib2 log (last 200 lines) ==="
          tail -200 spack_install_main_grib2.log || true
          echo "=== Spack install 2.4.0 cdf log (last 200 lines) ==="
          tail -200 spack_install_2.4.0_cdf.log || true
          echo "=== Spack install main cdf log (last 200 lines) ==="
          tail -200 spack_install_main_cdf.log || true
          echo "=== Spack install 2.4.0 pds4 log (last 200 lines) ==="
          tail -200 spack_install_2.4.0_pds4.log || true
          echo "=== Spack install main pds4 log (last 200 lines) ==="
          tail -200 spack_install_main_pds4.log || true
          echo "=== Finding build directories ==="
          find $HOME/spack/var/spack/stage -name '*.log' -o -name 'spack-build-out.txt' 2>/dev/null | head -10 || true
          echo "=== Showing any build output files ==="
          for f in $(find $HOME/spack/var/spack/stage -name 'spack-build-out.txt' 2>/dev/null | head -3); do
            echo "=== Contents of $f (last 100 lines) ==="
            tail -100 "$f" || true
          done
          echo "=== CMake error logs ==="
          for f in $(find $HOME/spack/var/spack/stage -name 'CMakeError.log' 2>/dev/null | head -3); do
            echo "=== Contents of $f ==="
            cat "$f" || true
          done
          echo "=== CMake output logs ==="
          for f in $(find $HOME/spack/var/spack/stage -name 'CMakeOutput.log' 2>/dev/null | head -3); do
            echo "=== Contents of $f (last 50 lines) ==="
            tail -50 "$f" || true
          done

      - name: List installed files (for manual verification)
        run: |
          echo "=== Listing installed files for manual verification ==="
          . $HOME/spack/share/spack/setup-env.sh
          echo "=== Installed packages ==="
          spack find -v nep || echo "NEP not found in installed packages"
          echo "=== All installed packages ==="
          spack find || true
          echo "=== Attempting to locate NEP installation ==="
          NEP_PREFIX=$(spack location -i nep 2>/dev/null) || NEP_PREFIX=""
          if [ -n "$NEP_PREFIX" ]; then
            echo "NEP installed at: $NEP_PREFIX"
            echo "=== NEP installation contents ==="
            ls -laR $NEP_PREFIX || true
            echo "=== Plugin directory ==="
            ls -la $NEP_PREFIX/lib/plugin/ 2>/dev/null || echo "Plugin directory not found"
            echo "=== All libraries found ==="
            find $NEP_PREFIX -name '*.so' -o -name '*.a' 2>/dev/null || echo "No libraries found"
          else
            echo "NEP installation not found - check build logs above"
          fi
          echo "=== Spack stage directory contents ==="
          ls -la $HOME/spack/var/spack/stage/ 2>/dev/null || echo "No stage directory"
          echo "=== Manual verification complete - review output above ==="
