<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="500" height="520" viewBox="0 0 500 520">
  <!-- Background -->
  <rect width="500" height="520" fill="white"/>
  
  <!-- Title -->
  <text x="250" y="30" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">OPeNDAP Client/Server Architecture</text>
  
  <!-- User Program Box -->
  <rect x="150" y="60" width="200" height="50" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="90" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">User Program</text>
  
  <!-- Down arrow 1 -->
  <line x1="250" y1="110" x2="250" y2="140" stroke="black" stroke-width="1.5"/>
  <polygon points="245,135 250,145 255,135" fill="black"/>
  <text x="260" y="128" font-family="sans-serif" font-size="10" text-anchor="start">nc_open()</text>
  
  <!-- NetCDF Library Box -->
  <rect x="150" y="145" width="200" height="60" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="170" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">NetCDF Library</text>
  <text x="250" y="190" font-family="sans-serif" font-size="10" text-anchor="middle">(DAP2/DAP4 Dispatch)</text>
  
  <!-- HTTP bracket/request box -->
  <rect x="50" y="225" width="400" height="80" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="250" y="245" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">HTTP Communication</text>
  
  <!-- Down arrow 2 -->
  <line x1="250" y1="205" x2="250" y2="225" stroke="black" stroke-width="1.5"/>
  <polygon points="245,220 250,230 255,220" fill="black"/>
  
  <!-- HTTP Request arrow -->
  <line x1="150" y1="265" x2="350" y2="265" stroke="black" stroke-width="1.5"/>
  <polygon points="345,260 355,265 345,270" fill="black"/>
  <text x="250" y="260" font-family="sans-serif" font-size="10" text-anchor="middle">HTTP Request (URL + constraint)</text>
  
  <!-- Up arrow for response -->
  <line x1="350" y1="285" x2="150" y2="285" stroke="black" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="155,280 145,285 155,290" fill="black"/>
  <text x="250" y="300" font-family="sans-serif" font-size="10" text-anchor="middle">DAP Response (binary data)</text>
  
  <!-- Down arrow 3 -->
  <line x1="250" y1="305" x2="250" y2="335" stroke="black" stroke-width="1.5"/>
  <polygon points="245,330 250,340 255,330" fill="black"/>
  
  <!-- OPeNDAP Server Box -->
  <rect x="150" y="340" width="200" height="60" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="365" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">OPeNDAP Server</text>
  <text x="250" y="385" font-family="sans-serif" font-size="10" text-anchor="middle">(Hyrax)</text>
  
  <!-- Down arrow 4 -->
  <line x1="250" y1="400" x2="250" y2="430" stroke="black" stroke-width="1.5"/>
  <polygon points="245,425 250,435 255,425" fill="black"/>
  <text x="260" y="418" font-family="sans-serif" font-size="10" text-anchor="start">read + subset</text>
  
  <!-- Local Files Box -->
  <rect x="150" y="435" width="200" height="50" fill="white" stroke="black" stroke-width="2"/>
  <text x="250" y="455" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Local Data Files</text>
  <text x="250" y="475" font-family="sans-serif" font-size="9" text-anchor="middle">netCDF, HDF5, etc.</text>
  
  <!-- Response flow (dashed arrows going up) -->
  <!-- Up arrow 1 -->
  <line x1="120" y1="460" x2="120" y2="370" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="115,375 120,365 125,375" fill="black"/>
  <text x="100" y="415" font-family="sans-serif" font-size="9" text-anchor="middle">Data</text>
  
  <!-- Up arrow 2 -->
  <line x1="120" y1="365" x2="120" y2="175" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="115,180 120,170 125,180" fill="black"/>
  <text x="100" y="270" font-family="sans-serif" font-size="9" text-anchor="middle">Translated</text>
  
  <!-- Up arrow 3 -->
  <line x1="120" y1="170" x2="120" y2="85" stroke="black" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="115,90 120,80 125,90" fill="black"/>
  <text x="95" y="130" font-family="sans-serif" font-size="9" text-anchor="middle">Array data</text>
  
  <!-- Legend/Labels -->
  <text x="380" y="400" font-family="sans-serif" font-size="9" text-anchor="start">Solid arrow = Request path</text>
  <text x="380" y="415" font-family="sans-serif" font-size="9" text-anchor="start">Dashed arrow = Response path</text>
  
  <!-- Box around client side -->
  <rect x="40" y="50" width="160" height="170" fill="none" stroke="black" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="120" y="65" font-family="sans-serif" font-size="9" text-anchor="middle" font-style="italic">Client Side</text>
  
  <!-- Box around server side -->
  <rect x="40" y="330" width="420" height="170" fill="none" stroke="black" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="420" y="345" font-family="sans-serif" font-size="9" text-anchor="middle" font-style="italic">Server Side</text>
  
</svg>
